                                <h4>技术岗 vs 非技术岗差距明显</h4>

                                    <li><strong>早期项目风险与收益并存</strong>：种子轮项目可能给出更高股权，但风险大</li>

                                <ol>

                                    <li><strong>远程友好</strong>：近半数岗位支持远程，不受地理限制</li>

                                <h3>4.2 市场现状总结</h3>
                                <p>Web3行业的就业市场呈现出"两极分化"特征：</p>
                                <ul>
                                    <li><strong>高端技术人才</strong>：供不应求，薪资持续走高</li>
                                    <li><strong>入门级岗位</strong>：僧多粥少，需要差异化竞争</li>
                                </ul>
